<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina | Contact</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>
  <div class="page-transition-overlay"><div class="transition-spinner"></div></div>
  <div id="navbar-placeholder"></div>

  <main>
    <section class="contact-section">
      <div class="contact-layout reveal">
        <div class="contact-info">
          <h1 data-i18n="contact_title">Connect With Us</h1>
          <p data-i18n="contact_subtitle">For private events, reservations, or general inquiries, our concierge is at your service.</p>
          
          <div class="info-grid">
            <div class="info-block">
              <strong data-i18n="contact_address_label">Location:</strong>
              <span data-i18n="contact_street">Tamar Mepe Street</span>
              <span data-i18n="contact_city_country">Kutaisi, Georgia</span>
            </div>
            <div class="info-block">
              <strong data-i18n="contact_phone_label">Phone:</strong>
              <span>+995 568 88 05 50<br>gaprindashvilimate4@gmail.com</span>
            </div>
            <div class="info-block full-width">
              <strong data-i18n="contact_hours_label">Hours:</strong>
              <span data-i18n="contact_hours_text">Mon - Sun, 12:00 PM - 11:30 PM</span>
            </div>
          </div>
          
          <!-- AJAX Interactive Booking Form -->
          <form id="booking-form" class="contact-form">
            <!-- Paste your Web3Forms Access Key inside the value attribute below -->
            <input type="hidden" name="access_key" value=6012012b-9862-412b-8b0e-450411f3c36a>
            
            <div class="input-group">
              <input type="text" name="name" data-i18n-placeholder="form_name" placeholder="Your Full Name" required>
            </div>
            <div class="input-group">
              <input type="email" name="email" data-i18n-placeholder="form_email" placeholder="Your Email Address" required>
            </div>
            <div class="input-group">
              <textarea rows="4" name="message" data-i18n-placeholder="form_message" placeholder="Reservation Details or Inquiry" required></textarea>
            </div>
            <button type="submit" class="btn-primary" data-i18n="btn_send">Send Inquiry</button>
          </form>

          <!-- Dynamic Success Message Container (Hidden by default) -->
          <div id="form-success-message" style="display: none; padding: 25px 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; text-align: center; margin-top: 20px; background-color: rgba(255,255,255,0.02);">
            <h3 data-i18n="booking_success_title" style="color: #61f4de; margin-bottom: 10px;">Inquiry Sent!</h3>
            <p data-i18n="booking_success_text" style="font-size: 0.95rem; line-height: 1.5; opacity: 0.8; margin: 0;"></p>
          </div>

          <!-- Dynamic Error Message Container (Hidden by default) -->
          <div id="form-error-message" style="display: none; padding: 15px; border: 1px solid #ff4d4d; border-radius: 4px; text-align: center; margin-top: 20px; background-color: rgba(255, 77, 77, 0.05);">
            <p data-i18n="booking_error_text" style="color: #ff4d4d; font-size: 0.95rem; margin: 0;"></p>
          </div>
        </div>
        
        <div class="map-container">
          <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d738.1145419856416!2d42.70538426961286!3d42.26874219061527!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x405c8d001a4cf5cd%3A0xf28283affff8e1c6!2sgagi%20qanavas%20baiti!5e0!3m2!1sen!2sge!4v1779906494588!5m2!1sen!2sge" 
            width="600" 
            height="450" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </div>
    </section>
  </main>
  
  <div id="footer-placeholder"></div>

  <script src="js/language-switcher.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>

  <!-- Form Interceptor Script -->
  <script>
    const form = document.getElementById('booking-form');
    const successMessage = document.getElementById('form-success-message');
    const errorMessage = document.getElementById('form-error-message');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const formData = new FormData(form);
      const object = Object.fromEntries(formData);
      const json = JSON.stringify(object);

      const submitBtn = form.querySelector('button[type="submit"]');
      const originalBtnText = submitBtn.innerHTML;
      submitBtn.innerHTML = "...";
      submitBtn.disabled = true;

      errorMessage.style.display = 'none';

      fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: json
      })
      .then(async (response) => {
        let res = await response.json();
        if (response.status == 200) {
          form.style.display = 'none';
          successMessage.style.display = 'block';
        } else {
          console.error(res);
          errorMessage.style.display = 'block';
          submitBtn.innerHTML = originalBtnText;
          submitBtn.disabled = false;
        }
      })
      .catch(error => {
        console.error(error);
        errorMessage.style.display = 'block';
        submitBtn.innerHTML = originalBtnText;
        submitBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
