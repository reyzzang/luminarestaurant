<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina | Contact</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>
  <div class="page-transition-overlay"><div class="transition-spinner"></div></div>
  <div id="navbar-placeholder"></div>

  <main>
    <section class="contact-section">
      <div class="contact-layout reveal">
        <div class="contact-info">
          <h1 data-i18n="contact_title">Connect With Us</h1>
          <p data-i18n="contact_subtitle">For private events, reservations, or general inquiries, our concierge is at your service.</p>
          
          <div class="info-grid">
            <div class="info-block">
              <strong data-i18n="contact_address_label">Location:</strong>
              <span>Tamar Mepe Street<br>Kutaisi, Georgia</span>
            </div>
            <div class="info-block">
              <strong data-i18n="contact_phone_label">Phone:</strong>
              <span>+995 568 88 05 50<br>gaprindashvilimate4@gmail.com</span>
            </div>
            <div class="info-block full-width">
              <strong data-i18n="contact_hours_label">Hours:</strong>
              <span data-i18n="contact_hours_text">Mon - Sun, 12:00 PM - 11:30 PM</span>
            </div>
          </div>
          
          <form class="contact-form" onsubmit="event.preventDefault();">
            <div class="input-group">
              <input type="text" data-i18n-placeholder="form_name" placeholder="Your Full Name" required>
            </div>
            <div class="input-group">
              <input type="email" data-i18n-placeholder="form_email" placeholder="Your Email Address" required>
            </div>
            <div class="input-group">
              <textarea rows="4" data-i18n-placeholder="form_message" placeholder="Reservation Details or Inquiry" required></textarea>
            </div>
            <button type="submit" class="btn-primary" data-i18n="btn_send">Send Inquiry</button>
          </form>
        </div>
        
        <div class="map-container">
          <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d11904.912389146522!2d42.6958476104863!3d42.26629910405822!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x405c8d197607ea01%3A0x8e8731307b9a7649!2sTamar%20Mepe%20St%2C%20Kutaisi%2C%20Georgia!5e0!3m2!1sen!2sus!4v1716833716000!5m2!1sen!2sus" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/language-switcher.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
