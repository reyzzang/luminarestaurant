<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina | Contact</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .contact-section { padding-top: 180px; }
    .contact-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 60px; box-shadow: var(--shadow-elegant); }
    
    .contact-info h1 { font-size: 3.5rem; color: var(--color-primary); margin-bottom: 20px; }
    .contact-info p { color: #ccc; margin-bottom: 40px; font-size: 1.1rem; }
    .info-block { margin-bottom: 25px; }
    .info-block strong { color: var(--color-primary); font-family: var(--font-heading); font-size: 1.3rem; letter-spacing: 1px; display: block; margin-bottom: 5px; }
    
    .contact-form { display: flex; flex-direction: column; gap: 25px; }
    .input-group { position: relative; }
    .contact-form input, .contact-form textarea { width: 100%; padding: 18px 20px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: var(--color-text-main); font-family: var(--font-body); font-size: 1rem; transition: var(--transition-smooth); outline: none; }
    .contact-form input:focus, .contact-form textarea:focus { border-color: var(--color-primary); background: rgba(0,0,0,0.5); }
    
    .contact-image-wrapper { width: 100%; height: 100%; min-height: 500px; overflow: hidden; position: relative; }
    .contact-image-wrapper img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
  </style>
</head>
<body>
  <div class="page-transition-overlay"><div class="transition-spinner"></div></div>
  <div id="navbar-placeholder"></div>

  <main>
    <section class="contact-section">
      <div class="contact-layout reveal">
        <div class="contact-info">
          <h1 data-i18n="contact_title">Connect With Us</h1>
          <p data-i18n="contact_subtitle">For private events, reservations, or general inquiries, our concierge is at your service.</p>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px;">
            <div class="info-block">
              <strong data-i18n="contact_address_label">Location:</strong>
              <span style="color: #aaa;">Tamar Mepe Street<br>Kutaisi, Georgia</span>
            </div>
            <div class="info-block">
              <strong data-i18n="contact_phone_label">Phone:</strong>
              <span style="color: #aaa;">+995 568 88 05 50<br>gaprindashvilimate4@gmail.com</span>
            </div>
            <div class="info-block" style="grid-column: span 2;">
              <strong data-i18n="contact_hours_label">Hours:</strong>
              <span style="color: #aaa;" data-i18n="contact_hours_text">Mon - Sun, 12:00 PM - 11:30 PM</span>
            </div>
          </div>
          
          <form class="contact-form" onsubmit="event.preventDefault();">
            <div class="input-group">
              <input type="text" data-i18n-placeholder="form_name" placeholder="Your Full Name" required>
            </div>
            <div class="input-group">
              <input type="email" data-i18n-placeholder="form_email" placeholder="Your Email Address" required>
            </div>
            <div class="input-group">
              <textarea rows="4" data-i18n-placeholder="form_message" placeholder="Reservation Details or Inquiry" required></textarea>
            </div>
            <button type="submit" class="btn-primary" data-i18n="btn_send" style="align-self: flex-start;">Send Inquiry</button>
          </form>
        </div>
        
<div class="contact-image-wrapper">
  <img src="assets/images/gallery/old-image-name.jpg" alt="Contact Page Visual">
</div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/language-switcher.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
