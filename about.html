<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Lumina | Our Story</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main style="padding-top: 120px; max-width: 800px; margin: 0 auto; padding-bottom: 60px;">
    
    <section class="about-section">
      <h2 data-i18n="about_title">Our Philosophy</h2>
      <p data-i18n="about_text_1">Lumina was created with the desire to turn dining into an unforgettable sensory journey.</p>
      <p data-i18n="about_text_2">We combine traditional heritage with modern elegance.</p>
      
      <div class="about-img-wrapper" style="margin: 30px 0;">
        <img src="assets/images/gallery/restaurant-interior.jpg" alt="Lumina Interior">
      </div>
    </section>

    <section class="about-section">
      <h2 data-i18n="about_chef_title">The Creator</h2>
      <p data-i18n="about_chef_text">With twenty years of experience in Michelin-starred kitchens, our executive chef crafts every dish as a work of art.</p>
      
      <div class="about-img-wrapper" style="margin: 30px 0;">
        <img src="assets/images/gallery/chef-portrait.jpg" alt="Executive Chef">
      </div>
    </section>

  </main>

  <div id="footer-placeholder"></div>

  <script src="js/language-switcher.js"></script>
  <script src="js/animations.js"></script>
